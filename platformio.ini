; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:lilygo-t-sim7000g]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; OTA partition scheme: two app slots (each 1.9MB) + 320KB SPIFFS.
; Required for ESP32 Update library to find the second app partition.
; Without this, Update.begin() fails silently on devices with only one app slot.
board_build.partitions = min_spiffs.csv

lib_deps =
  ; TinyGSM: pinned to master as of 2026-05. No stable tag exists; pin to a commit
  ; if upstream breakage is a concern (known issues: SIM7000G-specific AT quirks).
  https://github.com/vshymanskyy/TinyGSM.git
  bblanchon/ArduinoJson@^6.21.2
  paulstoffregen/OneWire@^2.3.8
  milesburton/DallasTemperature@^4.0.4

upload_speed = 115200

; Custom build targets for multiple buoys
extra_scripts = pre:tools/scripts/build_all_buoys.py

; Nice-to-have monitor filters (optional)
monitor_filters = colorize, time, log2file
monitor_flags = --log2file monitor.log