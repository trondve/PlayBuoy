; PlatformIO Project Configuration File
;
; Two environments — one per buoy.  Press Build (or Build All) in the IDE.
; NODE_ID and NAME are injected as build flags so each binary is unique.
; Firmware is deployed to /home/labpc/playbuoy/ after every build.
;
; CLI: pio run -e playbuoy_grinde
;      pio run -e playbuoy_vatna
;      python tools/scripts/build_all_buoys.py   (builds both)

; ── Shared settings ──────────────────────────────────────────────────────────
[env_base]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200

; OTA partition scheme: two app slots (each 1.9MB) + 320KB SPIFFS.
; Required for ESP32 Update library to find the second app partition.
; Without this, Update.begin() fails silently on devices with only one app slot.
board_build.partitions = min_spiffs.csv

lib_deps =
  ; TinyGSM: pinned to master as of 2026-05. No stable tag exists; pin to a commit
  ; if upstream breakage is a concern (known issues: SIM7000G-specific AT quirks).
  https://github.com/vshymanskyy/TinyGSM.git
  bblanchon/ArduinoJson@^6.21.2
  paulstoffregen/OneWire@^2.3.8
  milesburton/DallasTemperature@^4.0.4

upload_speed = 115200

; Deploy firmware to HTTP server after every build (even cache hits)
extra_scripts = post:tools/scripts/deploy_firmware.py

; Nice-to-have monitor filters (optional)
monitor_filters = colorize, time, log2file
monitor_flags = --log2file monitor.log

; ── Buoy environments ────────────────────────────────────────────────────────
[env:playbuoy_grinde]
extends = env_base
build_flags =
  '-DNODE_ID="playbuoy_grinde"'
  '-DNAME="Litla Grindevatnet"'

[env:playbuoy_vatna]
extends = env_base
build_flags =
  '-DNODE_ID="playbuoy_vatna"'
  '-DNAME="Vatnakvamsvatnet"'
